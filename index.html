<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>JS Contact List</title>
    <style>
        .inputFields{
            width: 75%;
            margin-bottom: 10px;
            padding: 5px;
        }
        #transparentGrayBG{
            position: absolute; 
            width: inherit; 
            height: inherit; 
            background-color: #000000; 
            opacity: 0.5; 
        }
        #modal{
            position: relative; 
            background-color: white; 
            width: 50%; 
            height: 50%; 
            left: 25%; 
            top: 25%;
            border-radius: 8px;
            padding-top: 20px;
        }
        .actionButtons{
            color: white; 
            width: 100%;
        }
        .action-btn {
            margin: 2px;
            cursor: pointer;
        }
    </style>
</head>
<body style="margin: 0px; font-family: Arial, sans-serif;">
    <div style="position: relative; width: 100%;">
        <div id="contactList" style="position: absolute; width: 100%; padding: 20px; box-sizing: border-box;">
            <center><h1>Contact List</h1></center>
            <table id="contactTable" border="1" style="width: 100%; border-collapse: collapse; text-align: left;">
                <tr style="background-color: #f2f2f2;">
                    <th style="padding: 10px;">LAST NAME</th>
                    <th style="padding: 10px;">FIRST NAME</th>
                    <th style="padding: 10px;">EMAIL ADDRESS</th>
                    <th style="padding: 10px;">CONTACT NUMBER</th>
                    <th style="width: 120px; padding: 10px;">ACTIONS</th>
                </tr>
            </table>
            <br/>
            <button onclick="popUpAction(true, 0)" style="float: right; font-size: 16px; padding: 10px 15px; cursor: pointer;">ADD CONTACT</button>
        </div>
        
        <div id="addContactPopup" style="width: 100%; height: 100vh; position: absolute; display: none; z-index: 10;">
            <div style="position: relative; width: inherit; height: inherit;">
                <div onclick="popUpAction(false, 0)" id="transparentGrayBG"></div>
                <div id="modal">
                    <center>
                        <h2 style="margin: 0px;" id="modalTitle">Add Contact</h2><br/>
                        <form id="modalForm" onsubmit="formSubmitted(event)">
                            <input required maxlength="50" name="lname" id="lname" placeholder="Last name" class="inputFields"/><br/>
                            <input required maxlength="50" name="fname" id="fname" placeholder="First name" class="inputFields"/><br/>
                            <input required maxlength="50" name="emailAdd" id="emailAdd" type="email" placeholder="Email address" class="inputFields"/><br/>
                            <input required maxlength="15" name="contactNum" id="contactNum" type="tel" placeholder="Contact number" class="inputFields"/><br/>
                            <button id="btnName" type="submit" style="padding: 8px 15px; cursor: pointer;">Submit</button>
                            <button type="button" onclick="popUpAction(false, 0)" style="padding: 8px 15px; cursor: pointer; margin-left: 5px;">Cancel</button>
                        </form>
                    </center>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
